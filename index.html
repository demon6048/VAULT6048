<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VaultKgb v7.0 - KGB Technology Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --bg-dark: #020617; --card-bg: rgba(15, 23, 42, 0.9); --accent: #3b82f6; --neon: #60a5fa; --success: #10b981; --danger: #ef4444; --whatsapp: #25D366; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; margin: 0; padding: 0; background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(30, 64, 175, 0.08) 0px, transparent 50%); background-attachment: fixed; overflow: hidden; }
        .glass { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cyber-input { background: rgba(2, 6, 23, 0.95); border: 1px solid rgba(59, 130, 246, 0.3); color: #f1f5f9; transition: all 0.2s ease; }
        .cyber-input:focus { border-color: var(--neon); box-shadow: 0 0 25px rgba(59, 130, 246, 0.2); outline: none; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item { display: flex; align-items: center; width: 100%; padding: 1rem 1.25rem; border-radius: 1.25rem; transition: all 0.2s; border: 1px solid transparent; margin-bottom: 0.5rem; }
        .nav-active { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.5); color: var(--neon); }
        .header-online { background-color: rgba(5, 150, 105, 0.9) !important; border-bottom: 2px solid #10b981; }
        .header-offline { background-color: rgba(220, 38, 38, 0.9) !important; border-bottom: 2px solid #ef4444; }
        .header-checking { background-color: rgba(15, 23, 42, 0.95) !important; }
        .pulse-white { animation: pulseW 2s infinite; }
        @keyframes pulseW { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-table { border-collapse: separate; border-spacing: 0 8px; }
        .custom-table tr { background: rgba(255, 255, 255, 0.02); }
        .custom-table td { padding: 1rem 1.5rem; }
        .custom-table td:first-child { border-top-left-radius: 1.25rem; border-bottom-left-radius: 1.25rem; }
        .custom-table td:last-child { border-top-right-radius: 1.25rem; border-bottom-right-radius: 1.25rem; }
        .btn-whatsapp { background-color: var(--whatsapp); color: white; transition: all 0.3s; }
        .btn-whatsapp:hover { background-color: #128c7e; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/javascript">
        window.KGB_SHEETS_URL = "https://script.google.com/macros/s/AKfycbzSyOxhQgGMFunKQllbKAHdljkAacI1u9LZ4Sn6txGufigVv2clkp8B4Xa4OHTgpALlMQ/exec";
    </script>
    <script type="text/babel">
        const { useState, useEffect, useCallback, memo } = React;

        const Icon = memo(({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`shrink-0 ${className}`}></i>;
        });

        const DataRow = memo(({ value, icon, mono, onCopy, label }) => (
            <div className="flex items-center justify-between gap-3 group/row py-0.5">
                <div className="flex flex-col min-w-0">
                    {label && <span className="text-[8px] font-black text-blue-500/60 uppercase tracking-tighter ml-1 leading-none mb-1">{label}</span>}
                    <div className="flex items-center gap-2 min-w-0">
                        {icon && <Icon name={icon} size={13} className="opacity-40" />}
                        <span className={`${mono ? 'mono text-[11px] bg-white/10 px-2 py-0.5 rounded' : 'text-sm font-bold text-white' } truncate`}>{value || '---'}</span>
                    </div>
                </div>
                <button onClick={() => onCopy(value)} className="opacity-0 group-hover/row:opacity-100 text-white/50 hover:text-white transition-all"><Icon name="copy" size={12}/></button>
            </div>
        ));

        // --- COMPONENTE DE FORMULARIO AISLADO ---
        const RegistroForm = ({ type, onSave }) => {
            const [localForm, setLocalForm] = useState(
                type === 'personal' ? { email: '', password: '' } :
                type === 'clients' ? { clientName: '', emailPhone: '', appPass: '', encryptPass: '', dvrUser: 'admin', dvrPass: '', whatsapp: '', tags: '' } :
                { clientName: '', model: '', serial: '', ip: '', location: '', installationDate: '', observations: '' }
            );

            useEffect(() => {
                setLocalForm(
                    type === 'personal' ? { email: '', password: '' } :
                    type === 'clients' ? { clientName: '', emailPhone: '', appPass: '', encryptPass: '', dvrUser: 'admin', dvrPass: '', whatsapp: '', tags: '' } :
                    { clientName: '', model: '', serial: '', ip: '', location: '', installationDate: '', observations: '' }
                );
            }, [type]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setLocalForm(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = () => {
                const sheetName = type === 'personal' ? 'Personales' : type === 'clients' ? 'Clientes' : 'Equipos';
                const values = Object.values(localForm);
                onSave(type, sheetName, values, localForm);
                setLocalForm(Object.fromEntries(Object.keys(localForm).map(k => [k, ''])));
            };

            return (
                <section className="glass p-6 lg:p-10 rounded-[3rem] shadow-2xl border border-white/5 mb-10">
                    <div className="flex items-center gap-4 mb-8">
                        <div className="w-12 h-12 rounded-[1rem] bg-blue-600/10 flex items-center justify-center text-blue-400 border border-blue-500/20 shadow-xl"><Icon name="plus" size={24} /></div>
                        <h2 className="text-2xl font-black uppercase tracking-tight italic">Nuevo Registro • {type === 'clients' ? 'Acceso HikConnect & DVR' : 'Sistema'}</h2>
                    </div>

                    {type === 'personal' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input name="email" value={localForm.email} onChange={handleChange} placeholder="Correo o Usuario" className="px-6 py-4 cyber-input rounded-2xl font-bold text-sm" />
                            <input name="password" value={localForm.password} onChange={handleChange} placeholder="Contraseña" className="px-6 py-4 cyber-input rounded-2xl font-bold text-sm" />
                        </div>
                    )}

                    {type === 'clients' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Nombre Cliente</label><input name="clientName" value={localForm.clientName} onChange={handleChange} placeholder="Ej: Juan Perez" className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm" /></div>
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Usuario HikConnect</label><input name="emailPhone" value={localForm.emailPhone} onChange={handleChange} placeholder="Email o Celular" className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm" /></div>
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Pass App Hik</label><input name="appPass" value={localForm.appPass} onChange={handleChange} placeholder="Clave App" className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm" /></div>
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Pass Cifrado (Stream)</label><input name="encryptPass" value={localForm.encryptPass} onChange={handleChange} placeholder="Codigo Verif." className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm" /></div>
                            
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2 text-blue-400">Usuario DVR</label><input name="dvrUser" value={localForm.dvrUser} onChange={handleChange} placeholder="admin" className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm border-blue-500/30" /></div>
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2 text-blue-400">Pass DVR Local</label><input name="dvrPass" value={localForm.dvrPass} onChange={handleChange} placeholder="Clave DVR" className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm border-blue-500/30" /></div>
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2 text-emerald-400">WhatsApp Perú</label><input name="whatsapp" value={localForm.whatsapp} onChange={handleChange} placeholder="9XXXXXXXX" className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm border-emerald-500/30" /></div>
                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Etiquetas</label><input name="tags" value={localForm.tags} onChange={handleChange} placeholder="Notas..." className="w-full px-5 py-3.5 cyber-input rounded-2xl font-bold text-sm" /></div>
                        </div>
                    )}

                    {type === 'cameras' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <input name="clientName" value={localForm.clientName} onChange={handleChange} placeholder="Cliente" className="px-5 py-3 cyber-input rounded-xl font-bold text-sm w-full" />
                            <input name="model" value={localForm.model} onChange={handleChange} placeholder="Modelo" className="px-5 py-3 cyber-input rounded-xl font-bold text-sm w-full" />
                            <input name="serial" value={localForm.serial} onChange={handleChange} placeholder="Serial" className="px-5 py-3 cyber-input rounded-xl font-bold text-sm w-full" />
                            <input name="ip" value={localForm.ip} onChange={handleChange} placeholder="IP" className="px-5 py-3 cyber-input rounded-xl font-bold text-sm w-full" />
                            <input name="location" value={localForm.location} onChange={handleChange} placeholder="Lugar" className="px-5 py-3 cyber-input rounded-xl font-bold text-sm w-full" />
                            <input name="installationDate" type="date" value={localForm.installationDate} onChange={handleChange} className="px-5 py-3 cyber-input rounded-xl font-bold text-sm w-full text-slate-500" />
                            <input name="observations" value={localForm.observations} onChange={handleChange} placeholder="Notas" className="md:col-span-2 px-5 py-3 cyber-input rounded-xl font-bold text-sm w-full" />
                        </div>
                    )}

                    <button onClick={handleSubmit} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black shadow-2xl uppercase tracking-[0.3em] hover:bg-blue-500 transition-all font-bold mt-8 flex items-center justify-center gap-4 active:scale-[0.98]">
                        <Icon name="save" size={20}/> Guardar Registro Permanente
                    </button>
                </section>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('clients'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('vault_kgb_v7_data');
                return saved ? JSON.parse(saved) : { personal: [], clients: [], cameras: [] };
            });
            const [syncQueue, setSyncQueue] = useState(() => {
                const saved = localStorage.getItem('vault_kgb_v7_queue');
                return saved ? JSON.parse(saved) : [];
            });
            const [notification, setNotification] = useState(null);
            const [cloudStatus, setCloudStatus] = useState('checking'); 
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                localStorage.setItem('vault_kgb_v7_data', JSON.stringify(data));
                localStorage.setItem('vault_kgb_v7_queue', JSON.stringify(syncQueue));
                if (syncQueue.length > 0 && cloudStatus === 'online') { processSyncQueue(); }
            }, [data, syncQueue, cloudStatus]);

            const processSyncQueue = async () => {
                if (syncQueue.length === 0 || !navigator.onLine) return;
                const item = syncQueue[0];
                try {
                    await fetch(window.KGB_SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
                    setSyncQueue(prev => prev.slice(1));
                    setCloudStatus('online');
                } catch (e) { setCloudStatus('offline'); }
            };

            const fetchCloudData = async () => {
                if (!navigator.onLine) return;
                setIsLoading(true); setCloudStatus('checking');
                try {
                    const response = await fetch(window.KGB_SHEETS_URL, { method: 'GET' });
                    const result = await response.json();
                    if (result && !result.error) {
                        setData({ 
                            personal: (result.personal || []).reverse(), 
                            clients: (result.clients || []).reverse(), 
                            cameras: (result.cameras || []).reverse() 
                        });
                        setCloudStatus('online');
                        showMsg("Sincronización Completa");
                    }
                } catch (e) { setCloudStatus('offline'); showMsg("Error Conexión"); } finally { setIsLoading(false); }
            };

            const formatPhoneForWhatsApp = (phone) => {
                const clean = phone.toString().replace(/\D/g, '');
                if (clean.length === 9) return `51${clean}`;
                return clean;
            };

            const sendWhatsApp = (item) => {
                const phone = formatPhoneForWhatsApp(item.whatsapp);
                if (!phone) { showMsg("Falta número de contacto"); return; }
                
                const message = `*Estimado/a ${item.clientName},*%0A%0A` +
                                `Reciba un cordial saludo del equipo de *KGB Technology*.%0A%0A` +
                                `Le informamos que la configuración de su sistema de seguridad ha sido completada satisfactoriamente. Aquí tiene sus credenciales de acceso:%0A%0A` +
                                `🔹 *PLATAFORMA HIK-CONNECT*%0A` +
                                `👤 *Usuario:* ${item.emailPhone}%0A` +
                                `🔑 *Clave App:* ${item.appPass}%0A` +
                                `🔐 *Código de Cifrado:* ${item.encryptPass}%0A%0A` +
                                `🔹 *ACCESO LOCAL DVR*%0A` +
                                `👤 *Usuario:* ${item.dvrUser || 'admin'}%0A` +
                                `🔑 *Contraseña:* ${item.dvrPass}%0A%0A` +
                                `⚠️ *NOTA DE SEGURIDAD:* En KGB Technology su privacidad es prioridad. Mantenemos una copia bajo protocolo de seguridad únicamente para brindarle soporte técnico inmediato y mantenimiento preventivo. Le sugerimos no compartir estos datos con terceros.%0A%0A` +
                                `Gracias por confiar en nuestra tecnología.%0A%0A` +
                                `*Atentamente,*%0A` +
                                `*KGB Technology*`;
                
                window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
                showMsg("Enviando a WhatsApp...");
            };

            useEffect(() => {
                const timer = setInterval(async () => {
                    try {
                        const controller = new AbortController();
                        const id = setTimeout(() => controller.abort(), 4000);
                        await fetch(window.KGB_SHEETS_URL, { method: 'GET', mode: 'no-cors', signal: controller.signal });
                        clearTimeout(id); setCloudStatus('online');
                    } catch (e) { setCloudStatus('offline'); }
                }, 25000);
                fetchCloudData();
                return () => clearInterval(timer);
            }, []);

            const showMsg = useCallback((text) => { setNotification(text); setTimeout(() => setNotification(null), 4000); }, []);
            const handleCopy = useCallback((val) => { navigator.clipboard.writeText(val); showMsg("Copiado"); }, [showMsg]);

            const handleSave = (type, sheetName, valuesForSheet, formData) => {
                const timestamp = new Date().toLocaleString();
                const newId = "loc_" + Date.now();
                const newItem = { id: newId, ...formData, createdAt: new Date().toISOString() };
                setData(prev => ({ ...prev, [type]: [newItem, ...prev[type]] }));
                setSyncQueue(prev => [...prev, { action: 'add', sheet: sheetName, values: [timestamp, ...valuesForSheet] }]);
                showMsg("Guardado y en cola de nube...");
            };

            const handleDelete = (type, id, sheetName, keyValue) => {
                setData(prev => ({ ...prev, [type]: prev[type].filter(x => x.id !== id) }));
                setSyncQueue(prev => [...prev, { action: 'delete', sheet: sheetName, value: keyValue }]);
                showMsg("Borrando de la nube central...");
            };

            const hStatusClass = cloudStatus === 'online' ? 'header-online' : cloudStatus === 'offline' ? 'header-offline' : 'header-checking';

            return (
                <div className="h-screen w-screen flex flex-col lg:flex-row overflow-hidden">
                    <div className={`fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass border border-white/20 px-6 py-4 rounded-3xl flex items-center gap-4 transform transition-all duration-500 z-[110] shadow-2xl ${notification ? 'translate-y-0 opacity-100' : '-translate-y-24 opacity-0 pointer-events-none'}`}>
                        <div className="w-2 h-2 rounded-full bg-white pulse-white"></div>
                        <span className="text-[10px] font-black uppercase tracking-[0.2em] text-white">{notification}</span>
                    </div>

                    <div className={`lg:hidden h-20 glass border-b flex items-center justify-between px-6 sticky top-0 z-[80] transition-all duration-500 ${hStatusClass}`}>
                        <div className="flex items-center gap-3 font-black text-xl tracking-tighter uppercase italic text-white">Vault<span>Kgb</span></div>
                        <div className="flex items-center gap-4">
                            <button onClick={fetchCloudData} className="p-2 text-white bg-black/20 rounded-lg border border-white/10"><Icon name="refresh-cw" size={18} /></button>
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-white bg-white/10 rounded-xl border border-white/20"><Icon name="menu" size={24} /></button>
                        </div>
                    </div>

                    <aside className={`fixed inset-y-0 left-0 z-[100] w-full lg:w-80 glass border-r border-white/5 transform transition-transform duration-500 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="flex flex-col h-full p-8">
                            <button onClick={() => setIsSidebarOpen(false)} className="lg:hidden absolute top-6 right-6 p-2 text-white/60 hover:text-white"><Icon name="x" size={30} /></button>
                            <div className="flex items-center gap-4 mb-12 px-2">
                                <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-2xl"><Icon name="shield" size={28} /></div>
                                <div><h1 className="text-2xl font-black uppercase italic tracking-tighter leading-none">Vault<span className="text-blue-500">Kgb</span></h1><p className="text-[9px] text-blue-400 font-bold tracking-[0.4em] mt-1 uppercase italic">PRO TRUST v7.0</p></div>
                            </div>
                            <nav className="flex-1 space-y-2 overflow-y-auto">
                                {[ {id:'personal', n:'Correos Personales', i:'mail', d:'Acceso Privado'}, {id:'clients', n:'Accesos Hikconnect', i:'lock', d:'Cuentas Hik App'}, {id:'cameras', n:'Equipos DVR e IP', i:'cctv', d:'Mapeo Hardware'} ].map(t => (
                                    <button key={t.id} onClick={() => { setActiveTab(t.id); setIsSidebarOpen(false); }} className={`nav-item ${activeTab === t.id ? 'nav-active' : 'text-slate-400 hover:bg-white/5'}`}>
                                        <div className="icon-box"><Icon name={t.i} size={20} /></div>
                                        <div className="text-left min-w-0"><div className="font-black text-sm uppercase mb-0.5 truncate">{t.n}</div><div className="text-[9px] font-bold uppercase opacity-40 italic">{t.d}</div></div>
                                    </button>
                                ))}
                            </nav>
                            <div className="mt-auto pt-8 border-t border-white/5">
                                <div className="glass bg-black/40 border border-white/5 rounded-[2rem] p-5">
                                    <div className="flex items-center justify-between mb-3 px-1">
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest italic">Live Uplink</span>
                                        <div className={`w-2.5 h-2.5 rounded-full ${cloudStatus === 'online' ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                    </div>
                                    <button onClick={fetchCloudData} className="w-full flex items-center justify-center gap-2 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase hover:bg-blue-500 shadow-lg active:scale-95 transition-all"><Icon name="database" size={14} className={isLoading ? "animate-spin" : ""} /> Forzar Precarga</button>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 lg:ml-80 h-full overflow-hidden relative bg-black/20 flex flex-col">
                        <header className={`hidden lg:flex h-24 px-12 items-center justify-between sticky top-0 z-40 shrink-0 transition-all duration-700 ${hStatusClass}`}>
                            <div className="flex items-center gap-6 text-white">
                                <div><h3 className="text-2xl font-black uppercase tracking-tighter italic leading-tight">{activeTab === 'personal' ? 'Correos Personales' : activeTab === 'clients' ? 'Accesos Hikconnect' : 'Equipos DVR e IP'}</h3><p className="text-[10px] font-bold text-white/70 uppercase tracking-[0.5em] mt-1 italic">KGB Technology Global Node</p></div>
                                <div className="h-10 w-px bg-white/20 mx-2"></div>
                                <div className="bg-black/20 border border-white/10 px-4 py-2 rounded-xl flex items-center gap-3">
                                    <div className="w-2 h-2 rounded-full bg-white pulse-white"></div>
                                    <span className="text-[10px] font-black uppercase tracking-widest leading-none">{cloudStatus === 'online' ? 'ONLINE • CLOUD SYNC' : 'MODO OFFLINE'}</span>
                                </div>
                            </div>
                            <button onClick={fetchCloudData} className="px-5 py-2.5 bg-black/20 border border-white/10 rounded-xl flex items-center gap-3 text-white hover:bg-black/40 transition-all shadow-xl"><Icon name="refresh-cw" size={16} className={isLoading ? "animate-spin" : ""} /><span className="text-[10px] font-black uppercase tracking-widest">Reconectar</span></button>
                        </header>

                        <div className="flex-1 w-full max-w-6xl mx-auto px-6 lg:px-12 py-10 overflow-y-auto fade-in scroll-smooth">
                            {isLoading ? (
                                <div className="py-32 text-center space-y-6"><div className="w-16 h-16 border-4 border-white/10 border-t-white rounded-full animate-spin mx-auto shadow-2xl"></div><div className="loading-pulse text-white/60 font-black uppercase tracking-[1em] text-[10px]">Descargando Datos...</div></div>
                            ) : (
                                <div className="space-y-6 pb-20">
                                    <RegistroForm type={activeTab} onSave={handleSave} />

                                    <section className="space-y-8">
                                        <div className="flex items-center gap-4 px-6 italic text-white/50"><Icon name="list" size={16}/><h3 className="font-black uppercase tracking-[0.4em] text-xs">Historial Operativo</h3><div className="h-px flex-1 bg-white/5"></div><span className="text-[9px] font-bold uppercase">{data[activeTab].length} Items</span></div>
                                        
                                        {activeTab === 'personal' && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                                {data.personal.map(item => (
                                                    <div key={item.id} className="glass p-8 rounded-[2.5rem] space-y-4 border border-white/5 group transition-all hover:border-blue-500/30">
                                                        <div className="flex justify-between items-start"><div className="w-10 h-10 rounded-2xl bg-blue-600/10 flex items-center justify-center text-blue-400"><Icon name="mail" size={18} /></div><button onClick={() => handleDelete('personal', item.id, 'Personales', item.email)} className="text-rose-500/30 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100 p-2"><Icon name="trash-2" size={18} /></button></div>
                                                        <div className="space-y-2"><DataRow value={item.email} icon="user" onCopy={handleCopy} /><DataRow value={item.password} icon="key" onCopy={handleCopy} /></div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {activeTab === 'clients' && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {data.clients.map(item => (
                                                    <div key={item.id} className="glass p-10 rounded-[3rem] border border-white/5 space-y-6 group transition-all hover:border-blue-500/30">
                                                        <div className="flex justify-between items-center">
                                                            <div className="flex flex-col min-w-0">
                                                                <h4 className="font-black text-2xl text-white uppercase italic truncate pr-2">{item.clientName}</h4>
                                                                {item.whatsapp && <span className="text-[10px] font-bold text-emerald-500 mono flex items-center gap-1"><Icon name="phone" size={10}/> {item.whatsapp}</span>}
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <button onClick={() => sendWhatsApp(item)} className="btn-whatsapp p-3 rounded-2xl shadow-xl flex items-center justify-center"><Icon name="send" size={20}/></button>
                                                                <button onClick={() => handleDelete('clients', item.id, 'Clientes', item.clientName)} className="text-rose-500/30 hover:text-rose-500 p-2 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" size={18} /></button>
                                                            </div>
                                                        </div>
                                                        <div className="grid grid-cols-1 gap-4">
                                                            <DataRow value={item.emailPhone} label="ACCESO HIKCONNECT" onCopy={handleCopy} />
                                                            <div className="grid grid-cols-2 gap-4">
                                                                <DataRow value={item.appPass} label="CLAVE APP" mono onCopy={handleCopy} />
                                                                <DataRow value={item.encryptPass} label="CIFRADO" mono onCopy={handleCopy} />
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-4 pt-2 border-t border-white/5">
                                                                <DataRow value={item.dvrUser || 'admin'} label="USER DVR" onCopy={handleCopy} />
                                                                <DataRow value={item.dvrPass} label="PASS DVR" mono onCopy={handleCopy} />
                                                            </div>
                                                            {item.tags && <div className="text-[10px] text-white/40 mono pt-2 truncate italic uppercase tracking-widest">Etiquetas: {item.tags}</div>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {activeTab === 'cameras' && (
                                            <div className="glass rounded-[3rem] overflow-hidden border border-white/5">
                                                <div className="overflow-x-auto"><table className="w-full text-left custom-table px-4"><thead className="text-[9px] font-black uppercase tracking-[0.2em] text-white/30 border-b border-white/5"><tr><th className="px-8 py-6">Entidad / Modelo</th><th className="px-8 py-6">Serie e IP</th><th className="px-8 py-6">Lugar</th><th className="px-8 py-6">Notas</th><th className="px-8 py-6 w-16"></th></tr></thead><tbody className="divide-y-8 divide-transparent">
                                                            {data.cameras.map(item => (
                                                                <tr key={item.id} className="group/row"><td><div className="flex flex-col gap-1 min-w-[180px]"><span className="text-sm font-black text-white uppercase italic">{item.clientName}</span><span className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">{item.model}</span></div></td><td><div className="space-y-1 min-w-[200px]"><DataRow value={item.serial} label="SERIAL" mono onCopy={handleCopy} /><DataRow value={item.ip} label="IP" mono onCopy={handleCopy} /></div></td><td><div className="space-y-1 min-w-[150px]"><DataRow value={item.location} icon="map-pin" onCopy={handleCopy} /><DataRow value={item.installationDate} icon="calendar" onCopy={handleCopy} /></div></td><td><p className="text-xs text-white/40 leading-relaxed italic max-w-[200px] line-clamp-2 hover:line-clamp-none transition-all">{item.observations || '---'}</p></td><td className="text-right"><button onClick={() => handleDelete('cameras', item.id, 'Equipos', item.serial)} className="p-3 text-rose-500/30 hover:text-rose-500 transition-all opacity-0 group-hover:row:opacity-100"><Icon name="trash-2" size={18} /></button></td></tr>
                                                            ))}
                                                </tbody></table></div>
                                            </div>
                                        )}
                                    </section>
                                </div>
                            )}
                        </div>
                        <footer className="p-8 text-white/10 text-[9px] font-black uppercase text-center tracking-[1.5em] italic shrink-0 pointer-events-none">VaultKgb Security Recovery Protocol Node-7</footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
