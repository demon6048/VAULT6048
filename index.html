<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGB SECURITY - Panel Visual (Lista Horizontal)</title>
    <style>
        /* ESTILO VISUAL: Streaming/Gaming UI, Oscuro, Neón, FILA ÚNICA */
        :root {
            --bg-page: #0a0710;       
            --bg-card: #14101d;       
            --bg-panel: #1a1525;      
            
            --cyan-btn-1: #00e5ff;
            --cyan-btn-2: #00bfff;
            --green-active: #00ff66;
            --purple-tag: #b300ff;
            
            --white: #ffffff;
            --gray-text: #9e9ba8;
            --gray-dark: #2a223d;
            --danger: #ff2a55;
            
            --shadow-glow: rgba(0, 229, 255, 0.3);
            --shadow-row: 0 4px 15px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--white);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER PRINCIPAL --- */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--gray-dark);
            z-index: 20;
        }

        .logo-container { display: flex; align-items: baseline; gap: 15px; }
        .logo-container h1 { color: var(--white); font-size: 22px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .logo-container p { color: var(--cyan-btn-1); font-size: 11px; text-transform: uppercase; font-weight: bold; }

        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        .status-badge {
            padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold;
            background-color: rgba(0, 255, 102, 0.1); border: 1px solid var(--green-active); color: var(--green-active);
        }
        .status-badge.preview {
            background-color: rgba(255, 42, 85, 0.1); border-color: var(--danger); color: var(--danger);
        }

        /* --- NAVEGACIÓN --- */
        .top-nav {
            display: flex; justify-content: center; gap: 10px; padding: 15px; background-color: var(--bg-page); flex-wrap: wrap;
        }

        .nav-btn {
            background-color: var(--bg-card); border: 1px solid var(--gray-dark); border-radius: 6px; color: var(--gray-text);
            padding: 10px 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;
        }
        .nav-btn:hover { color: var(--white); border-color: #4c406b; }
        .nav-btn.active {
            background: linear-gradient(90deg, #1c1530 0%, #2a2046 100%); color: var(--white); border-color: var(--purple-tag); box-shadow: 0 0 10px rgba(179, 0, 255, 0.2);
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content { flex: 1; padding: 15px 30px; overflow-y: auto; }
        .section-container { display: none; max-width: 1500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .section-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-title h2 { color: var(--white); font-weight: 800; font-size: 18px; text-transform: uppercase; }

        .search-bar {
            width: 100%; padding: 12px 20px; background-color: var(--bg-card); border: 1px solid var(--gray-dark);
            border-radius: 6px; color: var(--white); margin-bottom: 20px; font-size: 13px; transition: all 0.3s;
        }
        .search-bar:focus { outline: none; border-color: var(--cyan-btn-1); box-shadow: 0 0 8px var(--shadow-glow); }

        /* ====================================================
           LISTA HORIZONTAL (Una sola fila por usuario)
           ==================================================== */
        .list-view {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-row {
            background-color: var(--bg-card);
            border: 1px solid var(--gray-dark);
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            box-shadow: var(--shadow-row);
            transition: transform 0.2s, border-color 0.2s, background-color 0.2s;
        }
        .list-row:hover {
            transform: translateX(4px);
            border-color: #3b3054;
            background-color: #171322;
        }

        /* Bloque Izquierdo (Info del usuario) */
        .row-info {
            flex: 0 0 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .row-title {
            color: var(--white); font-size: 14px; font-weight: 800; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .row-subtitle {
            color: var(--gray-text); font-size: 11px; margin-top: 4px;
        }

        .badge-active-mini {
            background-color: rgba(0, 255, 102, 0.1); border: 1px solid var(--green-active); color: var(--green-active);
            padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; letter-spacing: 0.5px;
        }

        /* Bloque Central (Credenciales en línea) */
        .row-creds {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        
        .cred-box {
            display: flex; align-items: stretch; background: #000000;
            border: 1px solid var(--gray-dark); border-radius: 4px; overflow: hidden;
            flex: 0 1 auto; max-width: 250px;
        }
        
        .c-lbl {
            background: #1a1525; color: var(--gray-text); font-size: 9px; padding: 4px 8px;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
        
        .c-val {
            color: var(--cyan-btn-1); font-size: 12px; padding: 4px 10px; font-family: monospace;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center;
        }
        
        .cred-box button {
            background: #14101d; border: none; border-left: 1px solid var(--gray-dark);
            color: var(--white); padding: 0 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        .cred-box button:hover { background: rgba(0, 229, 255, 0.15); color: var(--cyan-btn-1); }

        /* Bloque Derecho (Etiquetas y Botones) */
        .row-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .bar-green {
            background-color: rgba(0, 255, 102, 0.05); border: 1px solid rgba(0, 255, 102, 0.2); color: var(--green-active);
            padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
        }
        
        .btn-action {
            background-color: #1e182d; border: 1px solid #32284d; color: var(--white); padding: 6px 12px;
            border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.2s; font-weight: bold; text-transform: uppercase;
        }
        .btn-action:hover { background-color: #2a2240; border-color: #4a3c6b; }
        
        .btn-gradient {
            background: linear-gradient(90deg, var(--cyan-btn-1) 0%, var(--cyan-btn-2) 100%); color: #000;
            border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; box-shadow: 0 2px 8px rgba(0, 229, 255, 0.2); display: flex; align-items: center; gap: 5px;
        }
        .btn-gradient:hover { box-shadow: 0 4px 12px rgba(0, 229, 255, 0.4); transform: scale(1.02); }

        .svg-icon { width: 14px; height: 14px; fill: currentColor; }

        /* Adaptación para pantallas pequeñas (Móviles) */
        @media (max-width: 1024px) {
            .list-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .row-info { flex: none; width: 100%; border-bottom: 1px solid var(--gray-dark); padding-bottom: 10px; }
            .row-creds { width: 100%; }
            .row-actions { width: 100%; justify-content: flex-end; padding-top: 5px; }
        }

        /* Modales */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.active { display: flex; }
        .modal { background-color: var(--bg-panel); border: 1px solid var(--gray-dark); border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 25px; }
        .modal h3 { color: var(--white); margin-bottom: 20px; font-size: 16px; text-transform: uppercase; border-bottom: 1px solid var(--gray-dark); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--gray-text); font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; background-color: var(--bg-page); border: 1px solid var(--gray-dark); border-radius: 4px; color: var(--white); font-family: monospace; font-size: 12px;}
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--cyan-btn-1); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        /* Dashboard */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .stat-card { background-color: var(--bg-card); padding: 20px; border-radius: 8px; text-align: center; border: 1px solid var(--gray-dark); }
        .stat-card h4 { color: var(--gray-text); font-size: 11px; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; color: var(--white); font-weight: 900; }

        /* Toasts */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background-color: var(--bg-panel); color: var(--white); padding: 12px 20px; border-radius: 4px; font-size: 13px; font-weight: bold; border-left: 3px solid var(--cyan-btn-1); animation: slideIn 0.3s ease forwards; opacity: 0; transform: translateX(100%); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body>

    <!-- HEADER SUPERIOR -->
    <header class="top-header">
        <div class="logo-container">
            <h1>KGB SECURITY</h1>
            <p>Registros Técnicos</p>
        </div>
        <div class="header-actions">
            <div id="connection-status" class="status-badge preview">🔴 VISTA PREVIA</div>
            <button class="btn-action" onclick="forceSync()">🔄</button>
        </div>
    </header>

    <!-- NAVEGACIÓN -->
    <nav class="top-nav">
        <button class="nav-btn active" data-target="sec-correos">✉️ Correos Personales</button>
        <button class="nav-btn" data-target="sec-hikconnect">🔐 Accesos HIK</button>
        <button class="nav-btn" data-target="sec-equipos">📹 Equipos DVR/IP</button>
        <button class="nav-btn" data-target="sec-dashboard">⚙️ Ajustes</button>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        
        <!-- SECCIÓN: CORREOS -->
        <section id="sec-correos" class="section-container active">
            <div class="section-header">
                <div class="section-title"><h2>Correos Personales</h2></div>
                <button class="btn-gradient" onclick="openModal('modal-correo')">+ Nuevo Registro</button>
            </div>
            <input type="text" class="search-bar" id="search-correos" placeholder="🔍 Buscar correo, etiqueta, notas..." onkeyup="filterList('list-correos', this.value)">
            <!-- CONTENEDOR TIPO LISTA -->
            <div id="list-correos" class="list-view"></div>
        </section>

        <!-- SECCIÓN: HIKCONNECT -->
        <section id="sec-hikconnect" class="section-container">
            <div class="section-header">
                <div class="section-title"><h2>Accesos HIKCONNECT</h2></div>
                <button class="btn-gradient" onclick="openModal('modal-hik')">+ Nuevo Acceso</button>
            </div>
            <input type="text" class="search-bar" id="search-hik" placeholder="🔍 Buscar cliente, usuario, WhatsApp..." onkeyup="filterList('list-hik', this.value)">
            <div id="list-hik" class="list-view"></div>
        </section>

        <!-- SECCIÓN: EQUIPOS -->
        <section id="sec-equipos" class="section-container">
            <div class="section-header">
                <div class="section-title"><h2>Equipos DVR e IP</h2></div>
                <button class="btn-gradient" onclick="openModal('modal-equipo')">+ Nuevo Equipo</button>
            </div>
            <input type="text" class="search-bar" id="search-equipos" placeholder="🔍 Buscar cliente, modelo, IP..." onkeyup="filterList('list-equipos', this.value)">
            <div id="list-equipos" class="list-view"></div>
        </section>

        <!-- SECCIÓN: DASHBOARD -->
        <section id="sec-dashboard" class="section-container">
            <div class="section-header"><div class="section-title"><h2>Configuración</h2></div></div>
            <div class="dashboard-grid">
                <div class="stat-card" style="grid-column: 1 / -1; max-width: 400px; margin: 0 auto;">
                    <h4>Conexión con Apps Script</h4>
                    <div class="value" id="dash-status" style="font-size: 16px; color: var(--danger); margin-bottom: 10px;">Desconectado</div>
                    <input type="text" id="config-url" placeholder="Pega URL de Google Script" class="search-bar" style="margin-bottom:10px; padding: 10px;">
                    <button class="btn-gradient" style="width: 100%; justify-content: center;" onclick="saveUrlConfig()">Vincular URL</button>
                </div>
                <div class="stat-card"><h4>Correos</h4><div class="value" id="dash-count-correos">0</div></div>
                <div class="stat-card"><h4>HikConnect</h4><div class="value" id="dash-count-hik">0</div></div>
                <div class="stat-card"><h4>Equipos</h4><div class="value" id="dash-count-equipos">0</div></div>
            </div>
        </section>
    </main>

    <!-- MODALES -->
    <div class="modal-overlay" id="modal-correo">
        <div class="modal">
            <h3 id="modal-correo-title">Nuevo Correo</h3>
            <form id="form-correo" onsubmit="saveRecord(event, 'correos')">
                <input type="hidden" id="correo-id">
                <div class="form-group"><label>Correo o usuario</label><input type="text" id="correo-user" required autocomplete="off"></div>
                <div class="form-group"><label>Contraseña</label><input type="text" id="correo-pass" required autocomplete="off"></div>
                <div class="form-group"><label>Etiquetas / notas cortas</label><textarea id="correo-notas" rows="2"></textarea></div>
                <div class="modal-actions">
                    <button type="button" class="btn-action" onclick="closeModal('modal-correo')">Cancelar</button>
                    <button type="submit" class="btn-gradient">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modal-hik">
        <div class="modal">
            <h3 id="modal-hik-title">Nuevo Acceso HIKCONNECT</h3>
            <form id="form-hik" onsubmit="saveRecord(event, 'hikconnect')">
                <input type="hidden" id="hik-id">
                <div class="form-group"><label>Cliente</label><input type="text" id="hik-cliente" required></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>User HIK</label><input type="text" id="hik-userhik"></div>
                    <div class="form-group" style="flex:1;"><label>Pass HIK</label><input type="text" id="hik-passhik"></div>
                </div>
                <div class="form-group"><label>Password Cifrado</label><input type="text" id="hik-passcif"></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>User DVR</label><input type="text" id="hik-userdvr"></div>
                    <div class="form-group" style="flex:1;"><label>Pass DVR</label><input type="text" id="hik-passdvr"></div>
                </div>
                <div class="form-group"><label>WhatsApp</label><input type="text" id="hik-whatsapp"></div>
                <div class="form-group"><label>Etiquetas y Notas</label><textarea id="hik-notas" rows="2"></textarea></div>
                <input type="hidden" id="hik-etiquetas" value="">
                <div class="modal-actions">
                    <button type="button" class="btn-action" onclick="closeModal('modal-hik')">Cancelar</button>
                    <button type="submit" class="btn-gradient">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modal-equipo">
        <div class="modal">
            <h3 id="modal-equipo-title">Nuevo Equipo</h3>
            <form id="form-equipo" onsubmit="saveRecord(event, 'equipos')">
                <input type="hidden" id="equipo-id">
                <div class="form-group"><label>Cliente</label><input type="text" id="equipo-cliente" required></div>
                <div class="form-group"><label>Modelo</label><input type="text" id="equipo-modelo" required></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>Serial</label><input type="text" id="equipo-serial"></div>
                    <div class="form-group" style="flex:1;"><label>IP</label><input type="text" id="equipo-ip"></div>
                </div>
                <div class="form-group"><label>Lugar de instalación</label><input type="text" id="equipo-lugar"></div>
                <div class="form-group"><label>Fecha</label><input type="date" id="equipo-fecha"></div>
                <div class="form-group"><label>Notas</label><textarea id="equipo-notas" rows="2"></textarea></div>
                <div class="modal-actions">
                    <button type="button" class="btn-action" onclick="closeModal('modal-equipo')">Cancelar</button>
                    <button type="submit" class="btn-gradient">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // CONFIGURACIÓN (URL PRE-CONFIGURADA)
        let DEFAULT_URL = "https://script.google.com/macros/s/AKfycbzFzOFCikHThKx0VBdFxasyZX8EbRnMNPpOxYwt5U8SL8lrCbToFIYmd2DUYMwrjjUN/exec";
        let GAS_WEB_APP_URL = localStorage.getItem('kgb_gas_url') || DEFAULT_URL;
        
        let state = { correos: [], hikconnect: [], equipos: [] };
        let isConnected = false; let autoSyncInterval;

        document.addEventListener('DOMContentLoaded', () => {
            setupNavigation();
            document.getElementById('config-url').value = GAS_WEB_APP_URL;
            if (!GAS_WEB_APP_URL) forcePreviewMode(); else forceSync();
            autoSyncInterval = setInterval(() => { if(GAS_WEB_APP_URL && isConnected) syncData(true); }, 30000);
        });

        function setupNavigation() {
            const items = document.querySelectorAll('.nav-btn[data-target]');
            items.forEach(item => {
                item.addEventListener('click', () => {
                    items.forEach(i => i.classList.remove('active')); item.classList.add('active');
                    document.querySelectorAll('.section-container').forEach(sec => sec.classList.remove('active'));
                    document.getElementById(item.getAttribute('data-target')).classList.add('active');
                });
            });
        }

        // DATOS MOCK (Reserva por si falla la conexión)
        function loadMockData() {
            state.correos = []; state.hikconnect = []; state.equipos = [];
            for(let i=1; i<=8; i++) { state.correos.push({ id: 'mock-c-'+i, createdAt: new Date().toISOString(), correoUsuario: `usuario${i}@gmail.com`, password: `PassDemo00${i}`, etiquetas: 'Personal', notas: 'correo demo' }); }
            for(let i=1; i<=8; i++) { state.hikconnect.push({ id: 'mock-h-'+i, createdAt: new Date().toISOString(), nombreCliente: `Cliente Demo 0${i}`, usuarioHikconnect: `user_hik_${i}`, passwordHikconnect: `PassHik${i}`, passwordCifrado: `Cifrado${i}`, usuarioDvrLocal: `admin${i}`, passwordDvrLocal: `AdminDVR${i}`, whatsappCliente: `5199988877${i%10}`, etiquetas: 'VIP', notasInternas: `Nota interna ${i}` }); }
            for(let i=1; i<=8; i++) { state.equipos.push({ id: 'mock-e-'+i, createdAt: new Date().toISOString(), cliente: `Empresa ${i} S.A.C`, modelo: `DVR Hikvision DS-720${i}`, serial: `SN9988776655${i}`, ip: `192.168.1.${100+i}`, lugarInstalacion: `Sede Principal`, fecha: new Date().toISOString().split('T')[0], notas: `Equipo de prueba` }); }
        }

        function updateConnectionUI(connected) {
            isConnected = connected;
            const badge = document.getElementById('connection-status');
            const dashStatus = document.getElementById('dash-status');
            if(connected) { badge.className = 'status-badge'; badge.innerHTML = '🟢 ONLINE'; dashStatus.innerHTML = 'Conectado a Google Sheets'; dashStatus.style.color = 'var(--green-active)'; } 
            else { badge.className = 'status-badge preview'; badge.innerHTML = '🔴 MODO DEMO'; dashStatus.innerHTML = 'Sin Conexión'; dashStatus.style.color = 'var(--danger)'; }
        }

        function forcePreviewMode() { loadMockData(); updateConnectionUI(false); renderAll(); }
        
        function saveUrlConfig() { 
            const url = document.getElementById('config-url').value.trim(); 
            localStorage.setItem('kgb_gas_url', url); 
            GAS_WEB_APP_URL = url; 
            showToast("URL guardada", "info"); 
            forceSync(); 
        }

        async function apiCall(action, entity, data = null, silent = false) {
            if (!GAS_WEB_APP_URL) return simulateApi(action, entity, data);
            try {
                const response = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, entity, data }), headers: { 'Content-Type': 'text/plain' } });
                const result = await response.json();
                if(result.success) { updateConnectionUI(true); return result; } else throw new Error(result.message);
            } catch (error) { updateConnectionUI(false); return simulateApi(action, entity, data); }
        }

        function simulateApi(action, entity, data) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    if(action === 'list') resolve({success: true, data: state[entity]});
                    else if(action === 'create') { data.id = 'loc-' + Math.random().toString(36).substr(2, 9); data.createdAt = new Date().toISOString(); state[entity].push(data); resolve({success: true}); }
                    else if(action === 'update') { const idx = state[entity].findIndex(e => e.id === data.id); if(idx !== -1) state[entity][idx] = {...state[entity][idx], ...data}; resolve({success: true}); }
                    else if(action === 'delete') { state[entity] = state[entity].filter(e => e.id !== data.id); resolve({success: true}); }
                }, 100);
            });
        }

        async function forceSync() { if(!GAS_WEB_APP_URL) return showToast("Falta URL de Google", "error"); await syncData(false); }
        async function syncData(silent = true) {
            try {
                const resC = await apiCall('list', 'correos', null, silent); const resH = await apiCall('list', 'hikconnect', null, silent); const resE = await apiCall('list', 'equipos', null, silent);
                if(resC?.success) state.correos = resC.data; if(resH?.success) state.hikconnect = resH.data; if(resE?.success) state.equipos = resE.data;
                renderAll(); if(!silent && isConnected) showToast("Sincronización completa", "success");
            } catch(e) {}
        }

        /* ====================================================
           RENDERIZADO LISTA HORIZONTAL (Fila Única)
           ==================================================== */
        function renderAll() { renderCorreos(); renderHik(); renderEquipos(); renderDashboard(); }

        function renderEquipos() {
            const list = document.getElementById('list-equipos'); list.innerHTML = '';

                list.innerHTML += `
                <div class="list-row search-item">

                    </div>
                    
                    <div class="row-creds">
                        <div class="cred-box">
                            <span class="c-lbl" style="background:#0a0a0a">SN</span>
                            <span class="c-val" style="color:var(--white)" title="${escapeHTML(row.serial)}">${escapeHTML(row.serial)}</span>

        function renderDashboard() {
            document.getElementById('dash-count-correos').innerText = state.correos.length;
            document.getElementById('dash-count-hik').innerText = state.hikconnect.length;
            document.getElementById('dash-count-equipos').innerText = state.equipos.length;
        }

        function filterList(listId, query) {
            const lowerQuery = query.toLowerCase();
            document.querySelectorAll(`#${listId} .search-item`).forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(lowerQuery) ? '' : 'none';
            });
        }

        async function saveRecord(e, entity) {
            e.preventDefault();
            let data = {}, modalId = '';
            if(entity === 'correos') {
                modalId = 'modal-correo';
                data = { id: document.getElementById('correo-id').value, correoUsuario: document.getElementById('correo-user').value, password: document.getElementById('correo-pass').value, notas: document.getElementById('correo-notas').value, etiquetas: "" };
            } else if(entity === 'hikconnect') {
                modalId = 'modal-hik';
                data = { id: document.getElementById('hik-id').value, nombreCliente: document.getElementById('hik-cliente').value, usuarioHikconnect: document.getElementById('hik-userhik').value, passwordHikconnect: document.getElementById('hik-passhik').value, passwordCifrado: document.getElementById('hik-passcif').value, usuarioDvrLocal: document.getElementById('hik-userdvr').value, passwordDvrLocal: document.getElementById('hik-passdvr').value, whatsappCliente: document.getElementById('hik-whatsapp').value, etiquetas: document.getElementById('hik-etiquetas').value, notasInternas: document.getElementById('hik-notas').value };
            } else if(entity === 'equipos') {
                modalId = 'modal-equipo';
                data = { id: document.getElementById('equipo-id').value, cliente: document.getElementById('equipo-cliente').value, modelo: document.getElementById('equipo-modelo').value, serial: document.getElementById('equipo-serial').value, ip: document.getElementById('equipo-ip').value, lugarInstalacion: document.getElementById('equipo-lugar').value, fecha: document.getElementById('equipo-fecha').value, notas: document.getElementById('equipo-notas').value };
            }
            const isEdit = !!data.id; if(!isEdit) delete data.id;
            closeModal(modalId);
            const res = await apiCall(isEdit ? 'update' : 'create', entity, data);
            if(res?.success) { showToast("Guardado.", "success"); syncData(true); }
        }

        function prepareEdit(entity, id) {
            const rowData = state[entity].find(item => item.id === id);
            if (!rowData) return;
            if(entity === 'correos') {
                document.getElementById('correo-id').value = rowData.id; document.getElementById('correo-user').value = rowData.correoUsuario || '';
                document.getElementById('correo-pass').value = rowData.password || ''; document.getElementById('correo-notas').value = rowData.notas || '';
                openModal('modal-correo');
            } else if(entity === 'hikconnect') {
                document.getElementById('hik-id').value = rowData.id; document.getElementById('hik-cliente').value = rowData.nombreCliente || '';
                document.getElementById('hik-userhik').value = rowData.usuarioHikconnect || ''; document.getElementById('hik-passhik').value = rowData.passwordHikconnect || '';
                document.getElementById('hik-passcif').value = rowData.passwordCifrado || ''; document.getElementById('hik-userdvr').value = rowData.usuarioDvrLocal || '';
                document.getElementById('hik-passdvr').value = rowData.passwordDvrLocal || ''; document.getElementById('hik-whatsapp').value = rowData.whatsappCliente || '';
                document.getElementById('hik-notas').value = rowData.notasInternas || '';
                openModal('modal-hik');
            } else if(entity === 'equipos') {
                document.getElementById('equipo-id').value = rowData.id; document.getElementById('equipo-cliente').value = rowData.cliente || '';
                document.getElementById('equipo-modelo').value = rowData.modelo || ''; document.getElementById('equipo-serial').value = rowData.serial || '';
                document.getElementById('equipo-ip').value = rowData.ip || ''; document.getElementById('equipo-lugar').value = rowData.lugarInstalacion || '';
                document.getElementById('equipo-fecha').value = rowData.fecha || ''; document.getElementById('equipo-notas').value = rowData.notas || '';
                openModal('modal-equipo');
            }
        }

        async function deleteRecord(entity, id) {
            if(confirm("¿Borrar este registro?")) {
                const res = await apiCall('delete', entity, {id: id});
                if(res?.success) { showToast("Eliminado", "success"); syncData(true); }
            }
        }

        function sendWhatsApp(id) {
            const data = state.hikconnect.find(r => r.id === id);
            if(!data || !data.whatsappCliente) return showToast("No hay WhatsApp registrado", "error");
            
            // Formateo automático para números de Perú
            let phone = data.whatsappCliente.replace(/\D/g,'');
            // Si el usuario ingresó solo los 9 dígitos, le agregamos el '51' de Perú automáticamente
            if (phone.length === 9) {
                phone = '51' + phone;
            }
            
            // Validamos que si un campo está vacío, muestre "N/A" (No Aplica) en lugar de romper el texto
            const name = data.nombreCliente || 'Cliente';
            const hikU = data.usuarioHikconnect || 'N/A';
            const hikP = data.passwordHikconnect || 'N/A';
            const cifrado = data.passwordCifrado || 'N/A';
            const dvrU = data.usuarioDvrLocal || 'N/A';
            const dvrP = data.passwordDvrLocal || 'N/A';
            
            // Mensaje profesional y prudente
            const msg = `Estimado(a) *${name}*, le saludamos cordialmente de *KGB SECURITY* 🛡️.\n\nNos comunicamos para informarle que hemos registrado y respaldado de forma segura las credenciales de sus equipos de videovigilancia.\n\nQueremos asegurarle que esta información será tratada con la más estricta confidencialidad y será utilizada *única y exclusivamente* para brindarle un soporte técnico rápido y eficiente cuando lo requiera.\n\nSus accesos registrados para soporte son:\n👤 *Usuario HIK:* ${hikU}\n🔑 *Pass HIK:* ${hikP}\n🔐 *Cifrado:* ${cifrado}\n👤 *Usuario DVR:* ${dvrU}\n🔑 *Pass DVR:* ${dvrP}\n\nPor su seguridad, le recomendamos no compartir estos datos con terceros no autorizados. ¡Quedamos a su entera disposición!`;
            
            // Método más seguro para evitar bloqueos de ventanas emergentes (Pop-ups)
            const url = `https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`;
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
            if(!document.getElementById(id).querySelector('input[type="hidden"]').value) document.getElementById(id).querySelector('form').reset();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active'); document.getElementById(id).querySelector('form').reset();
            document.getElementById(id).querySelector('input[type="hidden"]').value = '';
        }

        function copyToClipboard(text) {
            if (!text || text === 'undefined') return showToast("Nada que copiar", "error");
            const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); showToast("Copiado 📋", "info"); } catch(err) { } document.body.removeChild(ta);
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => { if(container.contains(toast)) container.removeChild(toast) }, 300); }, 3000);
        }

        function escapeHTML(str) { if(!str) return ''; return String(str).replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag)); }
        function escapeJS(str) { if(!str) return ''; return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"'); }
    </script>
